<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rishi Screener FINAL (Working)</title>
<style>
body{background:#0f1117;color:#fff;font-family:sans-serif;padding:20px}
button{padding:10px;background:#22c55e;border:none;border-radius:6px}
.pass{color:#22c55e}
.fail{color:#ef4444}
</style>
</head>

<body>

<h2>📈 Rishi Screener (FINAL STABLE)</h2>
<button onclick="startLoad()">Load Data</button>
<div id="status"></div>

<table id="tbl" style="display:none">
<thead>
<tr>
<th>Symbol</th>
<th>Price</th>
<th>Status</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<script>

const WORKER = "https://polished-truth-5188.photos-kohli-2021.workers.dev/";
const UNIVERSE = ['AVGO','COST','WMT','JPM'];

function calcSMA(arr,p){
  if(arr.length<p) return null;
  return arr.slice(-p).reduce((a,b)=>a+b,0)/p;
}

async function fetchStock(sym){

  const res = await fetch(`${WORKER}?symbol=${sym}`);
  const data = await res.json();

  if(!data.historical) return null;

  const prices = data.historical.map(d=>d.close).reverse();

  const price = prices[prices.length-1];
  const sma200 = calcSMA(prices,200);

  return {sym,price,sma200};
}

function pass(d){
  return d.price > d.sma200 * 0.9;
}

async function startLoad(){

  let out="";

  for(const sym of UNIVERSE){

    document.getElementById("status").innerText = "Loading " + sym;

    const d = await fetchStock(sym);

    if(!d) continue;

    const ok = pass(d);

    out += `<tr>
      <td>${sym}</td>
      <td>${d.price.toFixed(2)}</td>
      <td class="${ok?'pass':'fail'}">${ok?'PASS':'FAIL'}</td>
    </tr>`;
  }

  document.getElementById("body").innerHTML = out;
  document.getElementById("tbl").style.display="table";
  document.getElementById("status").innerText = "✅ Done";
}

</script>

</body>
</html>
