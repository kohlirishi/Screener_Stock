<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rishi Trend Screener</title>

<style>
:root{
  --bg:#0f1117;--surf:#1a1d27;--bdr:#2a2d3e;
  --txt:#e8eaf0;--pri:#3b82f6;--grn:#22c55e;--red:#ef4444;
}
body{background:var(--bg);color:var(--txt);font-family:sans-serif;padding:20px;}
h1{margin-bottom:10px;}
button{padding:8px 14px;border:none;border-radius:6px;background:var(--pri);color:#fff;cursor:pointer;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{padding:10px;border-bottom:1px solid var(--bdr);text-align:left;}
th{color:#8b90a7;font-size:12px;text-transform:uppercase;}
.pass{color:var(--grn);}
.fail{color:var(--red);}
</style>
</head>

<body>

<h1>📈 Rishi Trend Screener (S&P 100)</h1>
<button onclick="startLoad()">Load Data</button>

<div id="status" style="margin-top:10px;"></div>

<table id="table" style="display:none;">
<thead>
<tr>
  <th>Symbol</th>
  <th>Price</th>
  <th>EMA 50D</th>
  <th>SMA 200W</th>
  <th>Status</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
const UNIVERSE = ['AAPL','MSFT','NVDA','AMZN','META','TSLA','GOOGL','AVGO','COST','WMT','JPM','UNH','V','XOM','MA','HD','PG','JNJ','BAC','ABBV','NFLX','KO','MRK','CVX','CRM','PEP','TMO','LLY','AMD','ORCL','CSCO','ACN','MCD','ABT','DHR','WFC','TXN','ADBE','QCOM','GE','CAT','AMGN','INTU','IBM','GS','SPGI','ISRG','BKNG','HON','C','AXP','NEE','RTX','LOW','VRTX','UPS','TJX','CB','MMC','ETN','BSX','SYK','ADI','PANW','AMAT','SBUX','GILD','LRCX','MO','CI','ELV','CME','REGN','PGR','SO','DUK','BMY','KLAC','SNPS','CDNS','NKE','ITW','APD','SHW','CRWD','ORLY','MAR','AON','CTAS','PAYX','MCHP','NXPI','FTNT','ZTS','PCAR','FAST','ROST','DXCM','IDXX','MRVL'];

let allData = [];

// ----------- CALCULATIONS -----------
function calcEMA(arr,p){
  const v=arr.filter(x=>x!=null);
  if(v.length<p) return null;
  const k=2/(p+1);
  let e=v.slice(0,p).reduce((a,b)=>a+b,0)/p;
  for(let i=p;i<v.length;i++) e=v[i]*k+e*(1-k);
  return e;
}

function calcSMA(arr,p){
  const v=arr.filter(x=>x!=null);
  if(v.length<p) return null;
  return v.slice(-p).reduce((a,b)=>a+b,0)/p;
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(',');
    if(c.length>=5 && c[4]){
      rows.push({close:+c[4]});
    }
  }
  return rows.reverse();
}

// ----------- FETCH (CORS FIXED) -----------
async function fetchStooq(sym,freq){
  const proxy = "https://api.allorigins.win/raw?url=";
  const tries=[`${sym.toLowerCase()}.us`, sym.toLowerCase()];

  for(const t of tries){
    try{
      const url = `https://stooq.com/q/d/l/?s=${t}&i=${freq}`;
      const r = await fetch(proxy + encodeURIComponent(url));
      if(!r.ok) continue;

      const txt = await r.text();
      if(txt.includes('No data') || txt.length < 50) continue;

      return parseCSV(txt);

    }catch(e){}
  }
  return null;
}

// ----------- STOCK -----------
async function fetchStock(sym){
  const weekly = await fetchStooq(sym,'w');
  if(!weekly) return null;

  const wClose = weekly.map(r=>r.close);
  const price = wClose[wClose.length-1];
  const sma200w = calcSMA(wClose,200);

  const daily = await fetchStooq(sym,'d');
  const dClose = daily ? daily.map(r=>r.close) : [];
  const ema50d = calcEMA(dClose,50);

  return { sym, price, ema50d, sma200w };
}

// ----------- FILTER -----------
function whyFail(d){
  if(!d.price) return 'No Price';
  if(d.ema50d && d.price < d.ema50d) return 'Below EMA50D';
  if(!d.sma200w || d.price < d.sma200w) return 'Below 200W';
  return null;
}

// ----------- LOAD -----------
async function startLoad(){

  document.getElementById('status').innerText = "Loading...";
  document.getElementById('tbody').innerHTML = "";

  const results = await Promise.all(
    UNIVERSE.map(sym => fetchStock(sym))
  );

  allData = results.filter(x => x);

  if(allData.length === 0){
    document.getElementById('status').innerText = "❌ Failed to load data";
    return;
  }

  render();
}

// ----------- RENDER -----------
function render(){

  const rows = allData.map(d=>{
    const fail = whyFail(d);

    return `<tr>
      <td>${d.sym}</td>
      <td>$${d.price?.toFixed(2)}</td>
      <td>${d.ema50d?.toFixed(1) || '—'}</td>
      <td>${d.sma200w?.toFixed(1) || '—'}</td>
      <td class="${fail ? 'fail' : 'pass'}">${fail || 'PASS'}</td>
    </tr>`;
  }).join('');

  document.getElementById('tbody').innerHTML = rows;
  document.getElementById('table').style.display = 'table';
  document.getElementById('status').innerText = "✅ Loaded " + allData.length + " stocks";
}
</script>

</body>
</html>
