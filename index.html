<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rishi Trend Screener</title>

<style>
body{background:#0f1117;color:#e8eaf0;font-family:sans-serif;padding:20px}
button{padding:10px 20px;background:#22c55e;border:none;border-radius:6px;font-weight:bold;cursor:pointer}
table{width:100%;margin-top:20px;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #333;text-align:left}
.pass{color:#22c55e}
.fail{color:#ef4444}
</style>
</head>

<body>

<h2>📈 Rishi Trend Screener (TV-style)</h2>
<button onclick="startLoad()">Load Data</button>
<div id="status" style="margin-top:10px;color:#aaa"></div>

<table id="tbl" style="display:none">
<thead>
<tr>
<th>Symbol</th>
<th>Price</th>
<th>EMA 50D</th>
<th>SMA 50W</th>
<th>SMA 200W</th>
<th>Status</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<script>

const UNIVERSE = ['AAPL','MSFT','NVDA','AMZN','META','TSLA','GOOGL','AVGO','COST','WMT','JPM','UNH','V','XOM','MA'];

let allData=[];

// -------- EMA --------
function calcEMA(arr,p){
  if(arr.length<p) return null;
  const k=2/(p+1);
  let ema=arr.slice(0,p).reduce((a,b)=>a+b,0)/p;
  for(let i=p;i<arr.length;i++){
    ema=arr[i]*k + ema*(1-k);
  }
  return ema;
}

// -------- SMA --------
function calcSMA(arr,p){
  if(arr.length<p) return null;
  return arr.slice(-p).reduce((a,b)=>a+b,0)/p;
}

// -------- CSV --------
function parseCSV(text){
  const lines=text.trim().split('\n');
  const out=[];
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split(',');
    if(c.length>=5){
      out.push(+c[4]);
    }
  }
  return out.reverse();
}

// -------- FETCH --------
async function fetchStooq(sym,freq){

  const proxies=[
    "https://api.allorigins.win/raw?url=",
    "https://corsproxy.io/?"
  ];

  const tries=[`${sym.toLowerCase()}.us`, sym.toLowerCase()];

  for(const t of tries){
    for(const proxy of proxies){
      try{
        const url=`https://stooq.com/q/d/l/?s=${t}&i=${freq}`;
        const res=await fetch(proxy + encodeURIComponent(url));
        if(!res.ok) continue;

        const txt=await res.text();
        if(txt.includes("No data") || txt.length<50) continue;

        return parseCSV(txt);

      }catch(e){}
    }
  }

  return null;
}

// -------- STOCK --------
async function fetchStock(sym){

  const weekly = await fetchStooq(sym,'w');
  if(!weekly) return null;

  const daily = await fetchStooq(sym,'d');

  const price = weekly[weekly.length-1];

  const ema50 = daily ? calcEMA(daily,50) : null;
  const sma50w = calcSMA(weekly,50);
  const sma200w = calcSMA(weekly,200);

  return {sym,price,ema50,sma50w,sma200w};
}

// -------- FILTER (TV STYLE) --------
function pass(d){

  if(!d.price) return false;

  // 1. Price > EMA50 (daily)
  if(d.ema50 && d.price < d.ema50) return false;

  // 2. TREND: SMA50W > SMA200W (core TV logic)
  if(d.sma50w && d.sma200w && d.sma50w < d.sma200w) return false;

  // 3. BUFFER around SMA200W (very important)
  if(d.sma200w && d.price < d.sma200w * 0.95) return false;

  return true;
}

// -------- LOAD --------
async function startLoad(){

  document.getElementById('body').innerHTML="";
  document.getElementById('tbl').style.display="none";
  allData=[];

  for(let i=0;i<UNIVERSE.length;i++){

    const sym = UNIVERSE[i];

    document.getElementById('status').innerText =
      `Loading ${i+1}/${UNIVERSE.length} : ${sym}`;

    const d = await fetchStock(sym);

    if(d) allData.push(d);

    await new Promise(r=>setTimeout(r,120)); // prevent blocking
  }

  render();

  document.getElementById('status').innerText =
    `✅ Loaded ${allData.length} stocks`;
}

// -------- RENDER --------
function render(){

  const rows = allData.map(d=>{
    const ok = pass(d);

    return `<tr>
      <td>${d.sym}</td>
      <td>${d.price?.toFixed(2)}</td>
      <td>${d.ema50?.toFixed(2) || '-'}</td>
      <td>${d.sma50w?.toFixed(2) || '-'}</td>
      <td>${d.sma200w?.toFixed(2) || '-'}</td>
      <td class="${ok?'pass':'fail'}">${ok?'PASS':'FAIL'}</td>
    </tr>`;
  }).join('');

  document.getElementById('body').innerHTML = rows;
  document.getElementById('tbl').style.display="table";
}

</script>

</body>
</html>
